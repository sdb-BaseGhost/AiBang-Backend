server:
  port: 8081

spring:
  application:
    name: AIBAN
  datasource:
    url: jdbc:mysql://localhost:3306/aiban?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: "1019fxmm"
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 10000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml

jwt:
  secret: aiban-jwt-secret-key-2026-very-long-and-secure
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

dify:
  api-url: https://api.dify.ai/v1/chat-messages
  api-key: app-k8uaiUisxUcuHdVBLWMxoCV2
  resume-api-url: https://api.dify.ai/v1/workflows/run
  resume-api-key: app-Xc18JeYpAoG9y7pNewrwde8t
  connect-timeout: 10000
  read-timeout: 120000

file:
  upload-path: ./

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

knife4j:
